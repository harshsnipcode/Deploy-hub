server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — upload service handles deploy & status
    location /deploy {
        proxy_pass http://upload-service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /status {
        proxy_pass http://upload-service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Vite build assets
    location /assets/ {
        try_files $uri =404;
    }

    # Everything else — try request-handler (deployed sites), fallback to SPA
    location / {
        proxy_pass http://request-handler:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_intercept_errors on;
        error_page 404 = @spa;
    }

    location @spa {
        try_files /index.html =404;
    }
}
